name: gtd-bot
services:
  deno-dev:
    container_name: deno-dev
    build:
      context: ./deno
      dockerfile: Dockerfile.dev
    working_dir: /app
    profiles: ["dev"]
    environment:
      - WEBHOOK_URL_PROVIDER=http://cloudflared/url
    volumes:
      - ./deno:/app
    depends_on:
      - cloudflared

  cloudflared:
    container_name: cloudflared
    build: ./cloudflared
    profiles: ["dev"]
    
  deno:
    container_name: deno
    build: ./deno
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      - WEBHOOK_URL=https://gtd.witjt.org
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=gtd
      - POSTGRES_DB=gtd
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./postgres/seeds:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  postgres_volume:
