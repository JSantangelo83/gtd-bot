name: gtd-bot
services:
  deno:
    container_name: deno
    build: ./deno
    restart: unless-stopped
    profiles: ["prod"]

  deno-dev:
    container_name: deno-dev
    image: denoland/deno:2.5.4
    working_dir: /app
    profiles: ["dev"]
    command: >
      deno run
      --allow-all
      --watch
      main.ts
    volumes:
      - ./deno:/app  

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=gtd
      - POSTGRES_DB=gtd
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./postgres/seeds:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  postgres_volume: